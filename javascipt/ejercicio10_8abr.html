<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Dados 2 numeros enteros Visualizar los comprendidos entre ambos. Con funciones.
        var num1 = parseInt(prompt("Intrroduce el primer numero entero:"));
        var num2 = parseInt(prompt("Intrroduce el segundo numero entero:"));

        function visualizarComprendidos(num1, num2) {
            for (var i = num1 + 1; i < num2; i++) {
                alert(i);
            }
        }
        visualizarComprendidos(num1, num2);

    </script>
</body>
</html>
