<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Declarar dos arrays con valores numericoss enteros. Visualizar si los arrays son exactamente iguales o no.

        var numeros = [1, 2, 4, 7, 53];
        var numeros2 = [1, 2, 4, 7, 53];

        function Proceso(numeros, numeros2) {
            if (numeros.length !== numeros2.length) {
                return false;
            }
            for (var i = 0; i < numeros.length; i++) {
                if (numeros[i] !== numeros2[i]) {
                    return false;
                }
            }
            return true;
        }
        
        function Visualizar(dato) {
            if (dato) {
                document.write("Los arrays son exactamente iguales.");
            } else {
                document.write("Los arrays no son exactamente iguales.");
            }
        } 

        resul = Proceso(numeros, numeros2);
        Visualizar(resul);

    </script>
</body>
</html>
