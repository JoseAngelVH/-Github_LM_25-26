<!DOCTYPE html>

  <title>Ejemplo de JavaScript</title>

<body>
  <h3><strong id="resultado"></strong></h3>
 

<script>
  /*  /7.-) Se declaran dos listas con valores numéricos. Se pide visualizar los valores repetidos en ambas listas en la misma posición. Por ejemplo en:
lista1 = (3, 6, 7, 8, 9, 33)
lista2 = (3, 4, 7, 3, 9, 33)
La respuesta es 3, 7, 9 y 33. */
   var lista1 = [3, 6, 7, 8, 9, 33];
   var lista2 = [3, 6, 7, 88, 9, 33];
   
    // -------- FUNCIONES -------------
 

      
    function Visualizar (vector1, vector2){
       for (i=0; i < vector1.length; i++){
          if (vector1[i] == vector2[i]){
              document.write(vector1[i]+" ");
          }


        }
      
    }
        
        
    

    // --------- PROGRAMA PRINCIPAL -----------------
    
  
    Visualizar (lista1, lista2);


    

 
        

</script>




</body>

</html>
