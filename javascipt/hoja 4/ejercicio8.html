<!DOCTYPE html>

<html>

<head>

  <title>Ejemplo de JavaScript</title>

  <meta charset="UTF-8">
</head>

<body>
  <h3><strong id="resultado1"></strong></h3>
  <h3><strong id="resultado2"></strong></h3>
 

<script>
  /* 8.-) Se declara una lista con valores numéricos. 
a) Visualizar la media de los valores positivos
b) Visualizar la media de los valores negativos.  */
   var lista = [3, 6, 2, 2, 2, 3,-4,-4,-8];
   
   
    // -------- FUNCIONES -------------
 

      
    function MediaPos (vector){
      var acum =0, conta=0;

       for (i=0; i < vector.length; i++){          
          if (vector[i] >= 0){
            acum += vector[i];
            conta += 1;
          }         
        }
        var media = acum / conta;
        return media;
    }
    
       function MediaNeg (vector){
      var acum =0, conta=0;

       for (i=0; i < vector.length; i++){          
          if (vector[i] < 0){
            acum += vector[i];
            conta += 1
          }         
        }
        var media = acum / conta;
        return media;
    }
    function Visualizar1(dato){
      document.getElementById("resultado1").innerHTML="media de los positivos"+dato;
          
    }
     function Visualizar2(dato){
      document.getElementById("resultado2").innerHTML="media de los negativos"+dato;
          
    }
    // --------- PROGRAMA PRINCIPAL ----------------- 
    media_pos = MediaPos (lista);
    Visualizar1 (media_pos);
    media_neg = MediaNeg (lista);
    Visualizar2 (media_neg);


    

 
        

</script>




</body>

</html>
