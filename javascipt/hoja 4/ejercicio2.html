<!DOCTYPE html>

<html>

<head>

  <title>Ejemplo de JavaScript</title>

  <meta charset="UTF-8">
</head>

<body>
  <h3><strong id="resultado"></strong></h3>
 

<script>
    /*2.-) Se declaran valores enteros en una lista [10, 22, 30, 45, 32, 200, 11, 4, 70] y dos valores enteros: numero1 y numero2.
    a) Cuántos valores del la lista están contenidos entre los valores numero1 y numero2, inclusive ambos. Por ejemplo: si los dos números son: 40 y 100, habrían dos valores.
    b) Visualizar los valores (el 45 y el 70). */
   var lista = [10, 22, 30, 45, 32, 200, 11, 4, 70];
   var numero1 = 40;
   var numero2 = 100;
   

    // -------- FUNCIONES -------------
    function Proceso (vector, num1, num2){
        var conta=0;
        for (i=0; i < vector.length; i++){
            if (vector[i] > num1 && vector[i] < num2){
                conta += 1;
            }
        }
        return conta;
    }

    function Visualizar (dato,num1, num2){
        document.getElementById("resultado").innerHTML="valores del la lista están contenidos entre los valores "+ num1+" y "+num2+": "+dato;
      
        
        
    }

    // --------- PROGRAMA PRINCIPAL -----------------
    var resul = Proceso (lista,numero1, numero2);
    Visualizar (resul,numero1,numero2);


    

 
        

</script>




</body>

</html>
