<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Declarar un array de varios elementos. Por cada subarray visualizar el primero y el ultimo.
        var superarray = [
            [5,9,7,2],
            [8,7,2,9],
            [3,7,5,1],
        ]

        function Visualizar(superarray){
            for (i = 0; i < superarray.length; i++){
                document.write(superarray[i][0] + " " + superarray[i][superarray[i].length-1] + "<br>");
            }
        }
        Visualizar(superarray);
    </script>
</body>
</html>
