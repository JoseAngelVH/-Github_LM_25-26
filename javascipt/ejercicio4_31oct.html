<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numeros = [15, 8, 22, 5, 30, 12];
        VisualizarMayor(numeros);

        function VisualizarMayor(tab) {
            let mayor = tab[0];
            let posicion = 0;

            for (let i = 1; i < tab.length; i++) {
                if (tab[i] > mayor) {
                    mayor = tab[i];
                    posicion = i;
                }
            }

            document.write("El número mayor es " + mayor + " y esta en la posicion " + posicion + "<br>");
        }
    </script>
</body>
</html>
