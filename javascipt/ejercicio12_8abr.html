<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Dados 2 numeros enteros Visualizar los comprendidos entre ambos y si el primer numero es mayor qu el segundo tiene que dar mensaje de error. Visualizar cuantos valores negativos hay. Con funciones.
        var num1 = parseInt(prompt("Intrroduce el primer numero entero:"));
        var num2 = parseInt(prompt("Intrroduce el segundo numero entero:"));

        function visualizarComprendidos(num1, num2) {
            if (num1 > num2) {
                alert("Error: El primer numero es mayor que el segundo.");
            } else {
                var count = 0;
                for (var i = num1 + 1; i < num2; i++) {
                    if (i < 0) {
                        count++;
                    }
                }
                alert("Los numeros comprendidos entre " + num1 + " y " + num2 + " son: ");
                for (var i = num1 + 1; i < num2; i++) {
                    alert(i);
                }
                alert("La cantidad de valores negativos es: " + count);
            }
        }
        visualizarComprendidos(num1, num2);
    </script>
</body>
</html>
