<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numeros = [4, 7, 12, 9, 20, 33];
        Visualizar(numeros);

        function Visualizar(tab) {
            for (let i = 0; i < tab.length; i++) {
                if (tab[i] % 2 === 0) {
                    document.write(tab[i] + " es par<br>");
                } else {
                    document.write(tab[i] + " es impar<br>");
                }
            }
        }
    </script>
</body>
</html>
