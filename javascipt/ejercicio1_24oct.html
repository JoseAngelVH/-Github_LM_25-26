<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let tab=[5,10,3,15,8];
        Visualizar(tab);

        function Procceso(n){
            let suma = 0;
            for (i=  n-1; i >= 1; i--){
                suma = suma + i;
            }
            return suma;
        }
        function Visualizar(tab){
            for (i = 0; i < tab.length; i++){
                document.write(Proceso(tab[i]) + " ");
            }
        }
    </script>
</body>
</html>
