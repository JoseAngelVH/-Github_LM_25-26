<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // Visualizar el nombre del trabajador que tenga mayor media de sueldo.

        mat_sueldo = [
            ["Pepe", 800, 2300, 1900],
            ["Ana", 1500, 4000],
            ["Manuel", 900, 3200, 5000]
        ];

        function Visualizar(mat_sueldo){
            let mayor_media = 0;
            let trabajador = "";
            for (i=0; i < mat_sueldo.length; i++){
                let suma = 0;
                let media = 0;
                for (k=1; k < mat_sueldo[i].length; k++){
                    suma += mat_sueldo[i][k];
                    media = suma / (mat_sueldo[i].length - 1);
                }
                if (media > mayor_media){
                        mayor_media = media;
                        trabajador = mat_sueldo[i][0];
                    }
            }
            document.write("El trabajador con mayor media de sueldo es: " + trabajador + " con una media de: " + mayor_media);
        }

        Visualizar (mat_sueldo);

    </script>
</body>
</html>
