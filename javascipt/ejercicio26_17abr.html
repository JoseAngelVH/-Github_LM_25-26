<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Pedir numeros repetidamente hasta acertar una clave numerica, por cada numero introducido no acertado se le dara al usuario un mensaje como pista para 
        // decirle si el numero introducido es menor o mayor. Una vez acertado el numero visualizar las ocasiones que ha neceesitado para acertarlo.

        function Proceso(){
            let clave = 1234;
            let sw = 0;
            let contador = 0;
            while (sw == 0){
                let numero = parseInt(prompt("Introduce la clave numerica:"));
                if (numero == clave){
                    sw = 1;
                } else if (numero < clave) {
                    alert("El numero introducido es menor que la clave");
                    contador++;
                } else {
                    alert("El numero introducido es mayor que la clave");
                    contador++;
                }
            }
            return contador;
        }

        function Visulizar(contador){
            alert("Has necesitado " + contador + " intentos para acertar la clave");
        }

         Visulizar(Proceso());

    </script>
</body>
</html>
