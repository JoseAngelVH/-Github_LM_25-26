<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        

        // PROGRAMA PRINCIPAL
        edad = parseInt(prompt("Introduce tu edad:"))

        function Proceso(edad){
            if (edad >= 18) {
                resultado="Si puedes conducir"
            } else {
                resultado="No puedes conducir"
            }
            return resultado
        }

        function Visualizar(resultado){
            document.write("El resultado es: " + resultado)
        }

        Visualizar(Proceso(edad))

    </script>
</body>
</html>
